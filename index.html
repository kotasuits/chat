<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Messenger | Alex</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #f0f2f5; font-family: sans-serif; }
        .bubble { max-width: 80%; padding: 8px 12px; border-radius: 18px; font-size: 15px; }
        .bot { background: #e4e6eb; color: black; border-bottom-left-radius: 4px; }
        .user { background: #0084ff; color: white; border-bottom-right-radius: 4px; align-self: flex-end; }
        
        /* Typing Animation */
        .dot { width: 6px; height: 6px; background: #90949c; border-radius: 50%; display: inline-block; animation: wave 1.2s infinite; }
        .dot:nth-child(2) { animation-delay: 0.2s; }
        .dot:nth-child(3) { animation-delay: 0.4s; }
        @keyframes wave { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-5px); } }
        
        #emoji-box { display: none; }
        #emoji-box.open { display: grid; }
    </style>
</head>
<body class="flex justify-center items-center h-screen">

    <div class="w-full max-w-[400px] bg-white h-screen md:h-[600px] flex flex-col md:rounded-xl shadow-lg overflow-hidden relative">
        
        <div class="p-3 border-b flex items-center gap-3 shadow-sm">
            <div class="relative">
                <img src="alex.png" class="w-10 h-10 rounded-full object-cover border">
                <div class="absolute bottom-0 right-0 w-3 h-3 bg-green-500 border-2 border-white rounded-full"></div>
            </div>
            <div class="flex-1">
                <p class="font-bold text-sm">Alex</p>
                <p class="text-[11px] text-green-500 font-medium">Active now</p>
            </div>
        </div>

        <div id="chat" class="flex-1 p-4 overflow-y-auto flex flex-col gap-2 bg-white">
            <div class="text-center text-[10px] text-gray-400 my-4 uppercase tracking-widest">Connected</div>
        </div>

        <div id="emoji-box" class="absolute bottom-16 left-4 bg-white border shadow-xl p-2 grid-cols-5 gap-2 rounded-lg z-50">
            <span onclick="addEmoji('✨')" class="cursor-pointer p-1 text-xl">✨</span>
            <span onclick="addEmoji('🙏')" class="cursor-pointer p-1 text-xl">🙏</span>
            <span onclick="addEmoji('💰')" class="cursor-pointer p-1 text-xl">💰</span>
            <span onclick="addEmoji('🔥')" class="cursor-pointer p-1 text-xl">🔥</span>
            <span onclick="addEmoji('🙌')" class="cursor-pointer p-1 text-xl">🙌</span>
        </div>

        <div class="p-3 border-t flex items-center gap-2">
            <button onclick="document.getElementById('emoji-box').classList.toggle('open')" class="text-blue-500">
                <svg width="24" height="24" fill="currentColor" viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.41 0-8-3.59-8-8s3.59-8 8-8 8 3.59 8 8-3.59 8-8 8zm-5-9h10v2H7z"/></svg>
            </button>
            <input type="text" id="msg" disabled class="flex-1 bg-gray-100 rounded-full px-4 py-2 text-sm outline-none" placeholder="Wait for Alex...">
            <button id="btn" disabled onclick="send()" class="text-blue-600 font-bold px-2">Send</button>
        </div>
    </div>

    <script>
        const videoURL = "YOUR_LINK_HERE"; // Put your affiliate link here
        const chat = document.getElementById('chat');
        const input = document.getElementById('msg');
        const btn = document.getElementById('btn');

        window.onload = () => {
            setTimeout(() => {
                showTyping();
                setTimeout(() => {
                    hideTyping();
                    addMsg("Hi! Myself Alex, manifestation guru.", true);
                    setTimeout(() => {
                        showTyping();
                        setTimeout(() => {
                            hideTyping();
                            addMsg("What would you like to manifest today? ✨", true);
                            input.disabled = false; btn.disabled = false;
                            input.placeholder = "Type here...";
                        }, 1500);
                    }, 1000);
                }, 2000);
            }, 1000);
        };

        function addMsg(text, isBot) {
            const div = document.createElement('div');
            div.className = `bubble ${isBot ? 'bot' : 'user'}`;
            div.innerText = text;
            chat.appendChild(div);
            chat.scrollTop = chat.scrollHeight;
        }

        function showTyping() {
            const div = document.createElement('div');
            div.id = 'typing';
            div.className = 'bubble bot flex gap-1 items-center h-8 w-16';
            div.innerHTML = '<div class="dot"></div><div class="dot"></div><div class="dot"></div>';
            chat.appendChild(div);
            chat.scrollTop = chat.scrollHeight;
        }

        function hideTyping() { document.getElementById('typing')?.remove(); }

        function addEmoji(e) { 
            input.value += e; 
            document.getElementById('emoji-box').classList.remove('open');
        }

        function send() {
            const val = input.value.trim();
            if(!val) return;
            addMsg(val, false);
            input.value = "";
            input.disabled = true;

            setTimeout(() => {
                showTyping();
                setTimeout(() => {
                    hideTyping();
                    addMsg("I have a powerful secret for you. I'm taking you to a video that explains everything. Watch it now...", true);
                    setTimeout(() => { window.location.href = videoURL; }, 3000);
                }, 2500);
            }, 1000);
        }
    </script>
</body>
</html>
