<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Product Advisor</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 flex justify-center items-center h-screen">

    <div class="w-full max-w-md bg-white rounded-lg shadow-xl flex flex-col h-[600px]">
        <div class="bg-blue-600 text-white p-4 rounded-t-lg">
            <h2 class="text-xl font-bold">💬 Product Advisor</h2>
            <p class="text-sm">Ask me what you're looking for!</p>
        </div>

        <div id="chat-box" class="flex-1 p-4 overflow-y-auto flex flex-col gap-3">
            <div class="bg-gray-200 text-gray-800 p-3 rounded-lg max-w-[80%] self-start">
                Hi! What kind of solution are you looking for today? (e.g., "weight loss", "make money", "software")
            </div>
        </div>

        <div class="p-4 border-t flex gap-2">
            <input type="text" id="user-input" class="flex-1 border rounded-lg p-2 focus:outline-none focus:border-blue-600" placeholder="Type here..." onkeypress="handleEnter(event)">
            <button onclick="sendMessage()" class="bg-blue-600 text-white px-4 py-2 rounded-lg hover:bg-blue-700">Send</button>
        </div>
    </div>

    <script>
        // ---------------------------------------------------------
        // 🛠️ YOUR AFFILIATE & VIDEO DATA GOES HERE
        // ---------------------------------------------------------
        const productDatabase = [
            {
                keywords: ["weight", "diet", "fitness", "lose"],
                reply: "I know exactly what can help you with your fitness goals! I'm redirecting you to a free presentation now...",
                videoRedirectUrl: "https://your-affiliate-link.com/sales-video-1"
            },
            {
                keywords: ["money", "business", "income", "earn"],
                reply: "Great! Let me show you a proven system for generating income online. Redirecting to the video...",
                videoRedirectUrl: "https://your-affiliate-link.com/sales-video-2"
            }
        ];

        // Fallback message if they type something unexpected
        const defaultReply = "I don't have a specific product for that, but tell me more about what you want to achieve!";

        // ---------------------------------------------------------
        // ⚙️ CHATBOT LOGIC (Do not edit below unless you know JS)
        // ---------------------------------------------------------
        const chatBox = document.getElementById("chat-box");
        const userInput = document.getElementById("user-input");

        function handleEnter(event) {
            if (event.key === "Enter") sendMessage();
        }

        function addMessage(text, isBot) {
            const div = document.createElement("div");
            div.className = `p-3 rounded-lg max-w-[80%] ${isBot ? 'bg-gray-200 text-gray-800 self-start' : 'bg-blue-600 text-white self-end'}`;
            div.innerText = text;
            chatBox.appendChild(div);
            chatBox.scrollTop = chatBox.scrollHeight; // Auto-scroll to bottom
        }

        function sendMessage() {
            const text = userInput.value.trim().toLowerCase();
            if (!text) return;

            // 1. Show User Message
            addMessage(userInput.value, false);
            userInput.value = "";

            // 2. Find a matching product
            let foundProduct = null;
            for (let product of productDatabase) {
                if (product.keywords.some(keyword => text.includes(keyword))) {
                    foundProduct = product;
                    break;
                }
            }

            // 3. Bot Replies and Redirects (Simulating a slight delay)
            setTimeout(() => {
                if (foundProduct) {
                    addMessage(foundProduct.reply, true);
                    
                    // Trigger the redirect to the sales video after 2.5 seconds
                    setTimeout(() => {
                        window.location.href = foundProduct.videoRedirectUrl;
                    }, 2500);

                } else {
                    addMessage(defaultReply, true);
                }
            }, 600);
        }
    </script>
</body>
</html>
