<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Messenger | Alex</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #f0f2f5; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
        
        /* Messenger Blue */
        .messenger-blue { color: #0084FF; }
        .messenger-bg-blue { background-color: #0084FF; }

        /* Chat Bubbles */
        .bubble { max-width: 72%; padding: 10px 14px; font-size: 15px; line-height: 1.4; border-radius: 18px; }
        .bubble-bot { background-color: #e4e6eb; color: #050505; border-bottom-left-radius: 4px; }
        .bubble-user { background-color: #0084ff; color: white; border-bottom-right-radius: 4px; }

        /* Typing Dots Animation */
        .typing-dot { width: 6px; height: 6px; background: #90949c; border-radius: 50%; display: inline-block; animation: msg-typing 1.2s infinite ease-in-out; }
        .typing-dot:nth-child(2) { animation-delay: 0.2s; }
        .typing-dot:nth-child(3) { animation-delay: 0.4s; }
        @keyframes msg-typing { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-4px); } }

        #chat-box::-webkit-scrollbar { width: 4px; }
        #chat-box::-webkit-scrollbar-thumb { background: #bcc0c4; border-radius: 10px; }
        
        .fade-in { animation: fadeIn 0.3s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="flex justify-center items-center h-screen">

    <div class="w-full max-w-[480px] bg-white h-screen md:h-[750px] flex flex-col md:rounded-2xl shadow-2xl border border-gray-200 overflow-hidden">
        
        <div class="px-4 py-3 border-b flex items-center justify-between shadow-sm">
            <div class="flex items-center gap-3">
                <div class="relative">
                    <img src="images/Gemini_Generated_Image_p8q4glp8q4glp8q4.png" id="alex-photo" class="w-10 h-10 rounded-full object-cover border border-gray-100">
                    <span class="absolute bottom-0 right-0 w-3 h-3 bg-green-500 border-2 border-white rounded-full"></span>
                </div>
                <div>
                    <h2 class="font-bold text-[16px] leading-tight text-gray-900">Alex</h2>
                    <p class="text-[12px] text-gray-500">Active now</p>
                </div>
            </div>
            <div class="flex gap-5 messenger-blue">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor"><path d="M6.62 10.79a15.1 15.1 0 006.59 6.59l2.2-2.2a1 1 0 011.11-.27 11.72 11.72 0 003.7.59 1 1 0 011 1V20a1 1 0 01-1 1A15 15 0 013 6a1 1 0 011-1h3.5a1 1 0 011 1 11.72 11.72 0 00.59 3.7 1 1 0 01-.27 1.11l-2.2 2.2z"/></svg>
                <svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor"><path d="M17 10.5V7a1 1 0 00-1-1H4a1 1 0 00-1 1v10a1 1 0 001 1h12a1 1 0 001-1v-3.5l4 4v-11l-4 4z"/></svg>
                <svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-6h2v6zm0-8h-2V7h2v2z"/></svg>
            </div>
        </div>

        <div id="chat-box" class="flex-1 p-4 overflow-y-auto flex flex-col gap-3 bg-white">
            <div class="flex flex-col items-center py-8">
                <img src="images/Gemini_Generated_Image_p8q4glp8q4glp8q4.png" class="w-20 h-20 rounded-full object-cover mb-2 border">
                <h3 class="font-bold text-lg">Alex</h3>
                <p class="text-gray-500 text-sm">Manifestation Guru • Expert Advisor</p>
                <p class="text-gray-400 text-xs mt-1">You're connected on Messenger</p>
            </div>
        </div>

        <div class="p-3 bg-white flex items-center gap-2">
            <div class="flex gap-2 messenger-blue px-2">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm5 11h-4v4h-2v-4H7v-2h4V7h2v4h4v2z"/></svg>
            </div>
            <div class="flex-1 bg-[#f0f2f5] rounded-full px-4 py-2 border border-transparent focus-within:border-gray-200">
                <input type="text" id="user-input" disabled 
                    class="w-full bg-transparent border-none outline-none text-[15px] placeholder-gray-500" 
                    placeholder="Wait for Alex...">
            </div>
            <button id="send-btn" disabled onclick="sendMessage()" class="messenger-blue font-bold text-[15px] px-2 disabled:opacity-30">
                Send
            </button>
        </div>
    </div>

    <script>
        const config = {
            affiliateVideo: "YOUR_SALES_VIDEO_LINK_HERE", // Replace with your link
            alexImg: "images/Gemini_Generated_Image_p8q4glp8q4glp8q4.png"
        };

        const chatBox = document.getElementById("chat-box");
        const userInput = document.getElementById("user-input");
        const sendBtn = document.getElementById("send-btn");

        window.onload = () => {
            setTimeout(() => {
                addSystemMsg("Searching for online support...");
                setTimeout(startSequence, 1500);
            }, 500);
        };

        function startSequence() {
            addSystemMsg("Connected with Alex");
            showTyping();
            setTimeout(() => {
                hideTyping();
                addBotMsg("Hi! Myself Alex, manifestation guru.");
                setTimeout(() => {
                    showTyping();
                    setTimeout(() => {
                        hideTyping();
                        addBotMsg("I've helped thousands align with their abundance. What is your heart seeking today?");
                        unlockInput();
                    }, 1800);
                }, 1000);
            }, 2000);
        }

        function addBotMsg(text) {
            const wrap = document.createElement("div");
            wrap.className = "flex items-end gap-2 fade-in mb-1";
            wrap.innerHTML = `
                <img src="${config.alexImg}" class="w-7 h-7 rounded-full object-cover">
                <div class="bubble bubble-bot">${text}</div>
            `;
            chatBox.appendChild(wrap);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        function addUserMsg(text) {
            const wrap = document.createElement("div");
            wrap.className = "flex flex-col items-end gap-1 mb-1 fade-in";
            wrap.innerHTML = `
                <div class="bubble bubble-user">${text}</div>
                <span class="text-[10px] text-gray-400 mr-1">Delivered</span>
            `;
            chatBox.appendChild(wrap);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        function addSystemMsg(text) {
            const div = document.createElement("div");
            div.className = "text-center text-[11px] text-gray-400 my-2 italic";
            div.innerText = text;
            chatBox.appendChild(div);
        }

        function showTyping() {
            const wrap = document.createElement("div");
            wrap.id = "typing-bubble";
            wrap.className = "flex items-end gap-2 mb-1";
            wrap.innerHTML = `
                <img src="${config.alexImg}" class="w-7 h-7 rounded-full object-cover">
                <div class="bubble bubble-bot flex gap-1 items-center px-4 h-9">
                    <div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div>
                </div>
            `;
            chatBox.appendChild(wrap);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        function hideTyping() { document.getElementById("typing-bubble")?.remove(); }

        function unlockInput() {
            userInput.disabled = false; sendBtn.disabled = false;
            userInput.placeholder = "Aa"; userInput.focus();
        }

        function sendMessage() {
            const val = userInput.value.trim();
            if(!val) return;
            addUserMsg(val);
            userInput.value = "";
            userInput.disabled = true;

            setTimeout(() => {
                showTyping();
                setTimeout(() => {
                    hideTyping();
                    addBotMsg("The universe has a plan for you. I have prepared a specific frequency video for your situation.");
                    setTimeout(() => {
                        showTyping();
                        setTimeout(() => {
                            hideTyping();
                            addBotMsg("Redirecting you to the sacred presentation now. Please watch carefully.");
                            setTimeout(() => {
                                window.location.href = config.affiliateVideo;
                            }, 3000);
                        }, 1500);
                    }, 800);
                }, 2500);
            }, 800);
        }

        userInput.addEventListener("keypress", (e) => { if(e.key === "Enter") sendMessage(); });
    </script>
</body>
</html>
