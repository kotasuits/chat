<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat with Alex | Manifestation Expert</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }
        
        /* Smooth Scrollbar */
        #chat-box::-webkit-scrollbar { width: 5px; }
        #chat-box::-webkit-scrollbar-track { background: transparent; }
        #chat-box::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }

        /* Modern Message Bubbles */
        .bubble-bot { border-radius: 2px 18px 18px 18px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .bubble-user { border-radius: 18px 18px 2px 18px; box-shadow: 0 4px 10px rgba(79, 70, 229, 0.3); }

        /* Typing Dots Animation */
        .dot { animation: blink 1.4s infinite both; height: 6px; width: 6px; background-color: #94a3b8; border-radius: 50%; display: inline-block; margin: 0 2px; }
        .dot:nth-child(1) { animation-delay: 0.2s; }
        .dot:nth-child(2) { animation-delay: 0.4s; }
        .dot:nth-child(3) { animation-delay: 0.6s; }
        @keyframes blink { 0%, 100% { opacity: 0.3; transform: scale(0.8); } 50% { opacity: 1; transform: scale(1.1); } }
        
        .fade-in { animation: fadeIn 0.4s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="flex justify-center items-center h-screen p-4">

    <div class="w-full max-w-md bg-white/95 backdrop-blur-md rounded-[2rem] shadow-2xl flex flex-col h-[650px] overflow-hidden border border-white/20">
        
        <div class="bg-indigo-600 p-6 flex items-center justify-between shadow-lg">
            <div class="flex items-center gap-4">
                <div class="relative">
                    <img src="https://via.placeholder.com/150" id="profile-img" class="w-14 h-14 rounded-full border-2 border-white/30 object-cover shadow-md">
                    <span class="absolute bottom-0 right-0 w-4 h-4 bg-green-400 border-2 border-indigo-600 rounded-full"></span>
                </div>
                <div>
                    <h2 class="text-white font-semibold text-lg leading-tight">Alex</h2>
                    <p class="text-indigo-100 text-xs font-medium uppercase tracking-wider">Manifestation Guru</p>
                </div>
            </div>
            <div class="text-indigo-200">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 5v.01M12 12v.01M12 19v.01M12 6a1 1 0 110-2 1 1 0 010 2zm0 7a1 1 0 110-2 1 1 0 010 2zm0 7a1 1 0 110-2 1 1 0 010 2z" />
                </svg>
            </div>
        </div>

        <div id="chat-box" class="flex-1 p-6 overflow-y-auto flex flex-col gap-4 bg-[#f8fafc]">
            </div>

        <div class="p-4 bg-white border-t border-gray-100 flex items-center gap-3">
            <input type="text" id="user-input" disabled 
                class="flex-1 bg-gray-50 border-0 rounded-2xl p-4 text-sm focus:ring-2 focus:ring-indigo-500 transition-all outline-none disabled:opacity-50" 
                placeholder="Connecting to Alex...">
            <button id="send-btn" disabled onclick="sendMessage()" 
                class="bg-indigo-600 text-white p-4 rounded-2xl shadow-lg hover:bg-indigo-700 transition-all active:scale-95 disabled:grayscale">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 rotate-90" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8" />
                </svg>
            </button>
        </div>
    </div>

    <script>
        // --- DATA CONFIGURATION ---
        const config = {
            botName: "Alex",
            specialty: "Manifestation Guru",
            products: [
                { keywords: ["wealth", "money", "rich"], url: "LINK_HERE" },
                { keywords: ["love", "soulmate"], url: "LINK_HERE" }
            ],
            defaultRedirect: "MAIN_LINK_HERE"
        };

        const chatBox = document.getElementById("chat-box");
        const userInput = document.getElementById("user-input");
        const sendBtn = document.getElementById("send-btn");

        window.onload = () => {
            setTimeout(startSequence, 800);
        };

        function startSequence() {
            addSystemMsg("Searching for online support...");
            setTimeout(() => {
                showTyping();
                setTimeout(() => {
                    hideTyping();
                    addSystemMsg("Connected with Alex.");
                    addMsg(`Hi! I am ${config.botName}, your ${config.specialty}.`, true);
                    
                    setTimeout(() => {
                        showTyping();
                        setTimeout(() => {
                            hideTyping();
                            addMsg("Tell me, what are you looking to manifest in your life right now?", true);
                            unlockInput();
                        }, 1800);
                    }, 1000);
                }, 2000);
            }, 1500);
        }

        function addMsg(text, isBot) {
            const div = document.createElement("div");
            div.className = `max-w-[85%] p-4 text-sm fade-in ${isBot ? 'bg-white text-gray-700 bubble-bot self-start border border-gray-100' : 'bg-indigo-600 text-white bubble-user self-end'}`;
            div.innerText = text;
            chatBox.appendChild(div);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        function addSystemMsg(text) {
            const div = document.createElement("div");
            div.className = "text-center text-[10px] uppercase tracking-widest text-slate-400 my-2 font-bold";
            div.innerText = text;
            chatBox.appendChild(div);
        }

        function showTyping() {
            const div = document.createElement("div");
            div.id = "typing";
            div.className = "bubble-bot bg-white p-4 self-start flex gap-1 shadow-sm border border-gray-100";
            div.innerHTML = '<div class="dot"></div><div class="dot"></div><div class="dot"></div>';
            chatBox.appendChild(div);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        function hideTyping() { document.getElementById("typing")?.remove(); }

        function unlockInput() {
            userInput.disabled = false; sendBtn.disabled = false;
            userInput.placeholder = "Type your desire..."; userInput.focus();
        }

        function sendMessage() {
            const val = userInput.value.trim();
            if(!val) return;
            addMsg(val, false);
            userInput.value = "";
            userInput.disabled = true;

            setTimeout(() => {
                showTyping();
                setTimeout(() => {
                    hideTyping();
                    addMsg("I understand. I have prepared a special frequency video just for this. Redirecting you to watch it now...", true);
                    setTimeout(() => {
                        window.location.href = config.defaultRedirect;
                    }, 3000);
                }, 2500);
            }, 800);
        }

        function handleEnter(e) { if(e.key === "Enter") sendMessage(); }
        userInput.addEventListener("keypress", handleEnter);
    </script>
</body>
</html>
